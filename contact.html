<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Sophia H - Contact Page</title>
        <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="/styles.css" />
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="text/javascript">
            (function() {
                // https://dashboard.emailjs.com/admin/account
                emailjs.init({
                  publicKey: "ozIl9fUA5d-lQvASl",
                });
            })();
        </script>
        <script type="text/javascript">
            window.onload = function() {
                document.getElementById('contact-form').addEventListener('submit', function(event) {
                    event.preventDefault();
                    // these IDs from the previous steps
                    emailjs.sendForm('service_uom1uux', 'template_cg6xa9k', this)
                        .then(() => {
                            console.log('SUCCESS!');
                            window.location.replace("index.html");
                        }, (error) => {
                            console.log('FAILED...', error);
                        });
                });
            }
        </script>
    </head>
    <body>
    <div id="navbar">
        <a href=/index.html><img src = "/images/Home.png" style = "width: 30px; margin: 10px" role = "button" alt="Home button."></a>
    </div>
        
    <main>
        
        <div class=header>
            <h1>Contact Page</h1>
        </div>
        <div>
        <p>Please fill out this form and I'll get back to you as soon as possible.
            Please be patient as I manually check and reply to emails.
            <br><br>
            Please let me know if you need a resume or references.
            If you are with a company, please provide your company name in your message.</p>
        </div>
        
        <div>
            <form id="contact-form" style="border: dashed; border-radius: 10px; padding: 2%" onsubmit="alert('Please dismiss this message to submit. Once you submit, you will be redirected to the homepage. Thank you!');">
                <label>Name</label>
                <br>
                <input type="text" name="name" required class="formText">
                <br>
                <label>Email</label>
                <br>
                <input type="email" name="email" required class="formText">
                <br><br>
                <label>Subject</label>
                <br>
                <input type="text" name="title" required class="formText">
                <br>
                <label>Message</label>
                <br>
                <textarea name="message" required style="width: 100%; height: 100px" class="formText"></textarea>
                <input type="submit" value="Send" class="button">
            </form>
        
        </div>
        
    </main>
    <footer role = "footer">
        <a href=https://www.linkedin.com/in/sophiah27><img src = "/images/linked_logo.png" style = "width: 30px" role = "button" alt="LinkedIn logo."></a>
        <a href=https://github.com/soph39><img src = "/images/github_logo.png" style = "width: 30px" role = "button" alt = "GitHub logo."></a>
        <a href=https://www.youtube.com/channel/UCYhGLeYej_kP2b4jQlMffcA><img src = "/images/youtube_logo.png" style = "width: 30px" role = "button" alt="YouTube logo."></a>
    </footer>
    </body>
</html>
